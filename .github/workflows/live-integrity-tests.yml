name: Live Integrity Tests

on:
  push:
    branches:
      - main
      - agent/live-integrity-tests
  pull_request:
    paths:
      - "Genesis/**"
      - "tests/**"
      - "docs/privacy/**"
      - ".github/workflows/live-integrity-tests.yml"

permissions:
  contents: read

jobs:
  privacy-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime dependencies
        run: python -m pip install --upgrade pip -r requirements.txt

      - name: Run canonical privacy integrity suite
        run: python -m unittest discover -s tests -p "test_*.py" -v
