name: Genesis Kernel Tests

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "genesis_core/**"
      - "personas/sarah_ai/**"
      - "policies/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/genesis-kernel-tests.yml"
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "genesis_core/**"
      - "personas/sarah_ai/**"
      - "policies/**"
      - "tests/**"
      - "requirements.txt"

permissions:
  contents: read

jobs:
  constitutional-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile kernel and API
        run: python -m compileall -q genesis_core apps/api

      - name: Run constitutional tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: FastAPI import smoke test
        run: python -c "from apps.api.main import app; assert app.title == 'Genesis Kernel'"
